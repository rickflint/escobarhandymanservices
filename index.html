<!doctype html>
<html lang="en">
  <head>
    <!-- <script src="./script/gate.js"></script> -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escobar Handyman Home Services LLC | Las Vegas, NV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --purple: #4a1d8a;
        --purple-dark: #2d0f5e;
        --purple-light: #6b2fbd;
        --red: #c0392b;
        --red-bright: #e74c3c;
        --white: #ffffff;
        --off-white: #f5f3ef;
        --dark: #1c0726;
        --gray: #444444;
        --light-gray: #a1a1a1;
        --gold: #d4a017;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Lato", sans-serif;
        background: var(--off-white);
        color: var(--dark);
        overflow-x: hidden;
      }

      .topbar {
        background: var(--purple-dark);
        color: var(--white);
        text-align: center;
        padding: 8px 20px;
        font-family: "Oswald", sans-serif;
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .topbar a {
        color: var(--gold);
        text-decoration: none;
      }

      nav {
        background: var(--dark);
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        height: 64px;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
      }
      .nav-logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.6rem;
        color: var(--white);
        letter-spacing: 0.08em;
      }
      .nav-logo span {
        color: var(--red-bright);
      }
      .nav-links {
        display: flex;
        gap: 32px;
        list-style: none;
      }
      .nav-links a {
        color: var(--light-gray);
        text-decoration: none;
        font-family: "Oswald", sans-serif;
        font-size: 0.9rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color 0.2s;
        padding: 4px 0;
        border-bottom: 2px solid transparent;
      }
      .nav-links a:hover {
        color: var(--red-bright);
        border-bottom-color: var(--red-bright);
      }
      .nav-cta {
        background: var(--red);
        color: var(--white) !important;
        padding: 8px 20px !important;
        border-radius: 3px;
        border-bottom: none !important;
      }
      .nav-cta:hover {
        background: var(--red-bright) !important;
      }

      .hero {
        background: var(--dark);
        position: relative;
        overflow: hidden;
        min-height: 90vh;
        display: flex;
        align-items: center;
      }
      .hero-bg {
        position: absolute;
        inset: 0;
        background:
          repeating-linear-gradient(
            45deg,
            transparent,
            transparent 60px,
            rgba(74, 29, 138, 0.04) 60px,
            rgba(74, 29, 138, 0.04) 61px
          ),
          linear-gradient(160deg, #1a0a30 0%, #0d0d0d 50%, #1a050a 100%);
      }
      .hero-grid-line {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 80px 80px;
      }
      .hero-glow-purple {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(74, 29, 138, 0.25) 0%,
          transparent 70%
        );
        top: -100px;
        left: -100px;
      }
      .hero-glow-red {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(192, 57, 43, 0.15) 0%,
          transparent 70%
        );
        bottom: 0;
        right: 200px;
      }
      .hero-inner {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 60px 40px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: center;
      }
      .hero-text {
        color: var(--white);
      }
      .hero-eyebrow {
        font-family: "Oswald", sans-serif;
        font-size: 0.8rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .hero-eyebrow::before {
        content: "";
        display: block;
        width: 40px;
        height: 2px;
        background: var(--gold);
      }
      .hero-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(3rem, 6vw, 5.5rem);
        line-height: 0.95;
        margin-bottom: 8px;
        color: var(--white);
      }
      .hero-title .red {
        color: var(--red-bright);
      }
      .hero-subtitle {
        font-family: "Oswald", sans-serif;
        font-size: 1.3rem;
        color: var(--light-gray);
        margin-bottom: 24px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .hero-desc {
        font-size: 1rem;
        line-height: 1.7;
        color: #aaa;
        max-width: 460px;
        margin-bottom: 36px;
      }
      .hero-actions {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .btn-primary {
        background: var(--red);
        color: var(--white);
        padding: 14px 32px;
        font-family: "Oswald", sans-serif;
        font-size: 1rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-decoration: none;
        border: none;
        cursor: pointer;
        clip-path: polygon(
          0 0,
          calc(100% - 10px) 0,
          100% 10px,
          100% 100%,
          0 100%
        );
        transition:
          background 0.2s,
          transform 0.2s;
        display: inline-block;
      }
      .btn-primary:hover {
        background: var(--red-bright);
        transform: translateY(-2px);
      }
      .btn-outline {
        background: transparent;
        color: var(--white);
        padding: 14px 32px;
        font-family: "Oswald", sans-serif;
        font-size: 1rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-decoration: none;
        border: 2px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .btn-outline:hover {
        border-color: var(--white);
        color: var(--white);
      }
      .hero-phone {
        margin-top: 40px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .hero-phone .phone-icon {
        width: 44px;
        height: 44px;
        background: var(--purple-light);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        filter: brightness(1.3);
      }
      .hero-phone a {
        color: var(--white);
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        text-decoration: none;
        letter-spacing: 0.05em;
        transition: color 0.2s;
      }
      .hero-phone a:hover {
        color: var(--gold);
      }
      .hero-phone .label {
        display: block;
        font-size: 0.7rem;
        color: #888;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-family: "Oswald", sans-serif;
      }
      .hero-logo-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }
      .hero-logo-wrap::before {
        content: "";
        position: absolute;
        width: 480px;
        height: 480px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(74, 29, 138, 0.3) 0%,
          transparent 70%
        );
      }
      .hero-logo {
        max-width: 100%;
        width: 480px;
        filter: drop-shadow(0 0 40px rgba(74, 29, 138, 0.5))
          drop-shadow(0 8px 30px rgba(0, 0, 0, 0.8));
        position: relative;
        animation: floatLogo 4s ease-in-out infinite;
      }
      @keyframes floatLogo {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .trust-bar {
        background: var(--purple-dark);
        padding: 24px 40px;
        display: flex;
        justify-content: center;
        gap: 60px;
        flex-wrap: wrap;
        border-top: 3px solid var(--red);
      }
      .trust-item {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--white);
      }
      .trust-icon {
        font-size: 1.8rem;
      }
      .trust-text strong {
        display: block;
        font-family: "Oswald", sans-serif;
        font-size: 1rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--gold);
      }
      .trust-text span {
        font-size: 0.75rem;
        color: #ccc;
        letter-spacing: 0.05em;
      }

      .section-label {
        font-family: "Oswald", sans-serif;
        font-size: 0.75rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--red);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-label::after {
        content: "";
        display: block;
        flex: 1;
        max-width: 60px;
        height: 1px;
        background: var(--red);
      }
      h2.section-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(2.2rem, 4vw, 3.5rem);
        line-height: 1;
        color: var(--dark);
        margin-bottom: 16px;
      }
      .section-body {
        font-size: 1rem;
        line-height: 1.75;
        color: var(--gray);
        max-width: 560px;
      }

      .about-wrap {
        background: var(--white);
        position: relative;
        overflow: hidden;
      }
      .about-wrap::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          url("./img/about-bg-dots.png"), url("./img/about-bg-house.png"),
          url("./img/about-bg-tools-left.png"),
          url("./img/about-bg-tools-right.png");
        background-repeat: no-repeat, no-repeat, no-repeat, no-repeat;
        background-position:
          top -10px left -10px,
          top -20px right -20px,
          bottom -15px left -15px,
          bottom -15px right -15px;
        background-size:
          190px auto,
          420px auto,
          150px auto,
          140px auto;
        z-index: 0;
        pointer-events: none;
      }
      .about {
        padding: 100px 40px;
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: center;
        position: relative;
        z-index: 1;
      }
      .about-image-wrap {
        position: relative;
      }
      .about-image-bg {
        position: absolute;
        inset: 20px 0 -20px 20px;
        background: var(--purple);
        z-index: 0;
        border-radius: 2px;
      }
      .about-image-accent {
        position: absolute;
        top: -20px;
        right: -20px;
        width: 120px;
        height: 120px;
        background: var(--red);
        z-index: 0;
      }
      .about-img-placeholder {
        position: relative;
        z-index: 1;
        width: 100%;
        aspect-ratio: 4/3;
        background: linear-gradient(135deg, #1a0a30, #2d0f5e);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.2rem;
        color: rgba(255, 255, 255, 0.2);
        letter-spacing: 0.2em;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .about-img {
        position: relative;
        z-index: 1;
        display: block;
        width: 100%;
        aspect-ratio: 4/3;
        object-fit: contain;
        background: linear-gradient(135deg, #1a0a30, #2d0f5e);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 2px;
      }
      .about-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 36px;
      }
      .stat {
        border-left: 3px solid var(--red);
        padding-left: 16px;
      }
      .stat .num {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.4rem;
        color: var(--purple);
        line-height: 1;
      }
      .stat .label {
        font-size: 0.8rem;
        color: var(--gray);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: "Oswald", sans-serif;
      }

      .services-section {
        background: var(--dark);
        padding: 100px 40px;
        position: relative;
        overflow: visible;
      }
      .services-section::before {
        content: "SERVICES";
        position: absolute;
        top: 20px;
        right: -20px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 12rem;
        color: rgba(255, 255, 255, 0.02);
        pointer-events: none;
        white-space: nowrap;
      }
      .services-inner {
        max-width: 1200px;
        margin: 0 auto;
      }
      .services-inner .section-label {
        color: var(--gold);
      }
      .services-inner .section-label::after {
        background: var(--gold);
      }
      .services-inner h2.section-title {
        color: var(--white);
      }
      .services-inner .section-body {
        color: #aaa;
      }
      .services-flyer-grid {
        display: grid;
        grid-template-columns: 1.5fr 0.8fr;
        gap: 24px;
        margin-top: 50px;
        align-items: start;
      }
      .services-list-header,
      .ideal-for-header {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--purple);
        color: var(--white);
        font-family: "Oswald", sans-serif;
        font-size: 1rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 14px 20px;
      }
      .ideal-for-header {
        background: var(--red);
      }
      .svc-header-icon {
        font-size: 1.3rem;
      }
      .services-two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-top: none;
      }
      .svc-list {
        list-style: none;
        padding: 20px;
      }
      .svc-list:first-child {
        border-right: 1px solid #2a2a2a;
      }
      .svc-list li {
        font-size: 0.85rem;
        color: #ccc;
        padding: 6px 0 6px 26px;
        position: relative;
        border-bottom: 1px solid #242424;
        line-height: 1.4;
      }
      .svc-list li:last-child {
        border-bottom: none;
      }
      .svc-list li::before {
        content: "✓";
        position: absolute;
        left: 0;
        top: 6px;
        width: 16px;
        height: 16px;
        background: var(--purple);
        border-radius: 50%;
        color: #fff;
        font-size: 0.7rem;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 16px;
        text-align: center;
      }
      .svc-list li.svc-more {
        color: var(--gold);
        font-family: "Oswald", sans-serif;
        letter-spacing: 0.08em;
        font-size: 0.9rem;
      }
      .svc-list li.svc-more::before {
        content: none;
      }
      .ideal-for-wrap {
        display: flex;
        flex-direction: column;
      }
      .ideal-list {
        list-style: none;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-top: none;
        padding: 16px 20px;
        flex: 1;
      }
      .ideal-list li {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid #242424;
        font-size: 0.9rem;
        color: #ccc;
        line-height: 1.4;
      }
      .ideal-list li:last-child {
        border-bottom: none;
      }
      .ideal-icon {
        font-size: 1.3rem;
        flex-shrink: 0;
        margin-top: 1px;
      }

      .why-section {
        padding: 100px 40px;
        background: var(--off-white);
      }
      .why-inner {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 80px;
        align-items: start;
      }
      .why-list {
        margin-top: 40px;
      }
      .why-item {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        padding: 24px 0;
        border-bottom: 1px solid var(--light-gray);
      }
      .why-item:last-child {
        border-bottom: none;
      }
      .why-num {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.5rem;
        line-height: 1;
        color: var(--light-gray);
        min-width: 48px;
        text-align: right;
      }
      .why-item-text h4 {
        font-family: "Oswald", sans-serif;
        font-size: 1rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--dark);
        margin-bottom: 6px;
      }
      .why-item-text p {
        font-size: 0.88rem;
        color: var(--gray);
        line-height: 1.65;
      }
      .why-card {
        background: var(--purple-dark);
        padding: 48px 40px;
        color: var(--white);
        position: relative;
        overflow: hidden;
      }
      .why-card::after {
        content: "";
        position: absolute;
        bottom: -40px;
        right: -40px;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.03);
      }
      .why-card .big-quote,
      .why-card .end-quote {
        position: absolute;
        font-family: "Bebas Neue", sans-serif;
        font-size: 6rem;
        line-height: 1;
        color: rgba(255, 255, 255, 0.06);
        z-index: 0;
        pointer-events: none;
      }
      .why-card .big-quote {
        top: 0;
        left: 28px;
      }
      .why-card .end-quote {
        bottom: -18px;
        right: 28px;
      }
      .why-card blockquote {
        position: relative;
        z-index: 1;
        font-size: 1.1rem;
        line-height: 1.75;
        color: rgba(255, 255, 255, 0.85);
        font-style: italic;
        margin-bottom: 24px;
      }
      .why-card cite {
        position: relative;
        z-index: 1;
        font-family: "Oswald", sans-serif;
        font-size: 0.8rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--gold);
        font-style: normal;
      }
      .why-card .rhyan-name {
        position: relative;
        z-index: 1;
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        color: var(--white);
        margin-top: 32px;
        margin-bottom: 4px;
      }
      .why-card .rhyan-title {
        position: relative;
        z-index: 1;
        font-family: "Oswald", sans-serif;
        font-size: 0.8rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--red-bright);
      }

      .cta-band {
        background: linear-gradient(135deg, var(--red) 0%, #8b1a1a 100%);
        padding: 80px 40px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .cta-band::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 20px,
          rgba(0, 0, 0, 0.06) 20px,
          rgba(0, 0, 0, 0.06) 21px
        );
      }
      .cta-band-inner {
        position: relative;
        z-index: 1;
      }
      .cta-band h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(2.5rem, 5vw, 4rem);
        color: var(--white);
        margin-bottom: 16px;
        letter-spacing: 0.04em;
      }
      .cta-band p {
        color: rgba(255, 255, 255, 0.85);
        font-size: 1.1rem;
        max-width: 500px;
        margin: 0 auto 36px;
        line-height: 1.65;
      }
      .btn-white {
        background: var(--white);
        color: var(--red);
        padding: 16px 44px;
        font-family: "Oswald", sans-serif;
        font-size: 1.1rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-decoration: none;
        font-weight: 700;
        clip-path: polygon(
          0 0,
          calc(100% - 10px) 0,
          100% 10px,
          100% 100%,
          0 100%
        );
        transition: transform 0.2s;
        display: inline-block;
      }
      .btn-white:hover {
        transform: translateY(-3px);
      }
      .cta-phone {
        display: block;
        margin-top: 20px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.2rem;
        color: var(--white);
        text-decoration: none;
        letter-spacing: 0.06em;
      }
      .cta-phone:hover {
        color: var(--gold);
      }

      .contact-section {
        padding: 100px 40px;
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: start;
      }
      .contact-items {
        margin-top: 36px;
      }
      .contact-item {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 28px;
      }
      .contact-item-icon {

        height: 44px;

        align-items: center;

        flex-shrink: 0;

          0 0,

      .contact-item-text strong {

          font-weight: 700;

          padding: 48px 28px 16px;

        .nav-links.open::after {

          display: block;
          height: 80px;
          flex-shrink: 0;
        }
        .nav-phone-btn {

          margin: 0 28px 32px;

          color: var(--white);
          text-align: center;
          padding: 16px 20px;
          font-family: "Oswald", sans-serif;

          letter-spacing: 0.08em;
          text-decoration: none;

        .nav-links.open a {

        }

        .nav-contact-sticky {
          position: fixed;

          max-width: 340px;

          color: var(--white);

          padding: 20px;
          font-family: "Oswald", sans-serif;
          font-size: 1.1rem;
          letter-spacing: 0.15em;
          text-transform: uppercase;
          text-decoration: none;
          z-index: 201;
          display: none;
        }
        .nav-contact-sticky.visible {
          display: block;
        }
        .nav-close-btn {
          position: fixed;
          top: 16px;
          right: 16px;
          width: 40px;
          height: 40px;
          background: none;
          border: none;
          color: var(--white);
          font-size: 1.5rem;
          cursor: pointer;
          z-index: 202;
          display: none;
          align-items: center;
          justify-content: center;
        }
        .nav-close-btn.visible {
          display: flex;
        }
        .nav-overlay {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.6);
          z-index: 199;
        }
        .nav-overlay.visible {
          display: block;
        }
        .hamburger {
          display: flex;
          flex-direction: column;
          gap: 5px;
          cursor: pointer;
          background: none;
          border: none;

        }
        .hamburger span {
          display: block;
          width: 24px;
          height: 2px;
          background: var(--white);
        }
        .trust-bar {
          gap: 30px;

      @media (max-width: 600px) {

        html {
          overflow-x: hidden;
        }

          padding: 8px 16px;
          font-size: 0.75rem;
        }
        .hero-inner {
          padding: 40px 16px;
        }
        .about {
          padding: 60px 16px;
        }
        .why-section {
          padding: 60px 16px;
        }
        .services-section {
          padding: 60px 16px;
        }
        .contact-section {
          padding: 60px 16px;
        }
        .cta-band {

        }
        .trust-bar {
          padding: 20px 16px;
          flex-direction: column;
          gap: 20px;
          align-items: flex-start;
        }
        footer {
          padding: 48px 16px 24px;
        }
        .hero-glow-purple,
        .hero-glow-red {
          display: none;
        }
        .hero-logo {
          width: 260px;
        }
        .hero-title {
          font-size: clamp(2rem, 8vw, 3rem);
        }
        .footer-inner {
          grid-template-columns: 1fr;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .footer-bottom {
          flex-direction: column;
          gap: 8px;
          text-align: center;
        }
        .services-flyer-grid {
          gap: 16px;
        }
        .services-two-col {
          grid-template-columns: 1fr;
        }
        .svc-list {
          padding: 12px 14px;
        }
        .svc-list li {
          font-size: 0.8rem;
          padding: 5px 0 5px 20px;
        }
        .ideal-for-wrap {
          width: 100%;
        }
        .ideal-list {
          padding: 10px 14px;
        }
        .ideal-list li {
          font-size: 0.85rem;
          gap: 8px;
        }
        .services-list-header,
        .ideal-for-header {
          font-size: 0.85rem;
          padding: 12px 14px;
        }
        .why-card {
          padding: 32px 24px;
        }
        .contact-form {
          padding: 32px 20px;
        }
        .cta-band h2 {
          font-size: clamp(1.6rem, 6vw, 2.5rem);

      .footer-social {
        display: flex;
        gap: 14px;
        margin-top: 20px;
      }
      .social-icon {
        width: 36px;
        height: 36px;
        background: #32214b;
        display: flex;
        align-items: center;
        justify-content: center;
        clip-path: polygon(
          0 0,
          calc(100% - 8px) 0,
          100% 8px,
          100% 100%,
          0 100%
        );
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .social-icon svg {
        width: 20px;
        height: 20px;
        fill: var(--white);
      }
      .social-icon:hover {
        background: var(--red);
        transform: translateY(-3px);
      }
    </style>

  <body>
    <!-- TOP BAR -->

    <!-- NAV -->
    <nav>
      <div class="nav-logo">Escobar <span>Handyman</span></div>

      <div class="nav-overlay" id="navoverlay" onclick="closeNav()"></div>
      <button class="nav-close-btn" id="navclose" onclick="closeNav()">
        &#x2715;
      </button>
      <a
        href="#contact"
        class="nav-contact-sticky"
        id="navsticky"
        onclick="closeNav()"
        >Contact</a
      >
      <button class="hamburger" aria-label="Menu" onclick="openNav()">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-grid-line"></div>
      <div class="hero-glow-purple"></div>
      <div class="hero-glow-red"></div>
      <div class="hero-inner">
        <div class="hero-text">
          <div class="hero-eyebrow">Las Vegas, NV &middot; Home Services</div>
          <h1 class="hero-title">
            Coming<br /><span class="red">Soon!</span>
          </h1>
          <div class="hero-subtitle">Escobar Handyman Home Services LLC</div>
          <!-- <p class="hero-desc">
            Reliable Property Maintenance for Properties, Homes, Rentals and
            Businesses.<br />
            <br />
            Dependable, professional support for homeowners, renters, property
            managers, landlords and business owners&mdash;keeping every property
            clean, functional and well maintained.
          </p> 
           <div class="hero-actions">
            <a href="#contact" class="btn-primary">Get a Free Quote</a>
            <a href="#services" class="btn-outline">Our Services</a>
          </div> -->
          <!-- <div class="hero-phone">
            <div class="phone-icon">&#128222;</div>
            <div>
              <span class="label">Call Escobar Handyman Services Directly</span>
              <a href="tel:7022014848">702 201 4848</a>
            </div>
          </div> -->
        </div>
        <div class="hero-logo-wrap">
          <!-- <img
            src="./img/escobar-logo01.png"
            alt="Escobar Handyman Home Services LLC Logo"
            class="hero-logo"
          /> -->
        </div>
      </div>
    </section>



    <script>
      // Set current year in footer
      document.getElementById("copyrightDate").textContent =
        new Date().getFullYear();

      // ─── NAV ───
      function openNav() {
        document.getElementById("navlinks").classList.add("open");
        document.getElementById("navclose").classList.add("visible");
        document.getElementById("navsticky").classList.add("visible");
        document.getElementById("navoverlay").classList.add("visible");
        document.body.style.overflow = "hidden";
      }
      function closeNav() {
        document.getElementById("navlinks").classList.remove("open");
        document.getElementById("navclose").classList.remove("visible");
        document.getElementById("navsticky").classList.remove("visible");
        document.getElementById("navoverlay").classList.remove("visible");
        document.body.style.overflow = "";
      }
      document
        .querySelectorAll("#navlinks a")
        .forEach((a) => a.addEventListener("click", closeNav));

      // ─── FORMSPREE AJAX SUBMIT ───
      // Submits via fetch so the user stays on the page.
      const quoteForm = document.getElementById("quoteForm");
      quoteForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        const btn = quoteForm.querySelector('button[type="submit"]');
        btn.textContent = "Sending\u2026";
        btn.disabled = true;

        try {
          const res = await fetch(quoteForm.action, {
            method: "POST",
            body: new FormData(quoteForm),
            headers: { Accept: "application/json" },
          });

          if (res.ok) {
            quoteForm.reset();
            quoteForm.style.display = "none";
            document.getElementById("formSuccess").style.display = "block";
          } else {
            btn.textContent = "Error \u2014 Please Try Again";
            btn.disabled = false;
          }
        } catch (err) {
          btn.textContent = "Error \u2014 Please Try Again";
          btn.disabled = false;
        }
      });
    </script>
